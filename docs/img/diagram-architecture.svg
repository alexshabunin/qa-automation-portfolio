<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#e8e2da"/>
    </marker>
    <style>
      .bg { fill: #030303; }
      .grid { stroke: rgba(232,226,218,0.06); stroke-width: 1; }
      .box { fill: none; stroke: #e8e2da; stroke-width: 1.2; }
      .box-soft { fill: none; stroke: rgba(232,226,218,0.35); stroke-width: 1; stroke-dasharray: 4 4; }
      .label { fill: #f7f7f7; font-size: 18px; font-weight: 500; }
      .sub { fill: rgba(247,247,247,0.55); font-size: 13px; }
      .group-title { fill: rgba(232,226,218,0.55); font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; }
      .edge { stroke: #e8e2da; stroke-width: 1.2; fill: none; }
      .edge-label { fill: rgba(247,247,247,0.65); font-size: 12px; font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="560"/>
  <!-- subtle grid -->
  <g class="grid">
    <line x1="0"   y1="120" x2="1200" y2="120"/>
    <line x1="0"   y1="440" x2="1200" y2="440"/>
    <line x1="600" y1="0"   x2="600"  y2="560"/>
  </g>

  <!-- group: SUT -->
  <g>
    <rect class="box-soft" x="40"  y="40"  width="280" height="200" rx="2"/>
    <text class="group-title" x="56" y="68">SUT</text>
    <rect class="box" x="60"  y="90"  width="240" height="60" rx="2"/>
    <text class="label" x="80" y="120">app/  TaskFlow SPA</text>
    <text class="sub"   x="80" y="138">HTML + CSS + 1 JS file</text>

    <rect class="box" x="60"  y="170" width="240" height="60" rx="2"/>
    <text class="label" x="80" y="200">backend/  FastAPI</text>
    <text class="sub"   x="80" y="218">JWT auth · in-memory store</text>
  </g>

  <!-- group: test suites -->
  <g>
    <rect class="box-soft" x="380" y="40" width="440" height="380" rx="2"/>
    <text class="group-title" x="396" y="68">TEST SUITES</text>

    <rect class="box" x="400" y="90"  width="400" height="90" rx="2"/>
    <text class="label" x="420" y="120">ui-pytest/</text>
    <text class="sub"   x="420" y="142">pytest + Playwright + classic POM</text>
    <text class="sub"   x="420" y="160">mocks via page.route()  ·  11 tests</text>

    <rect class="box" x="400" y="200" width="400" height="90" rx="2"/>
    <text class="label" x="420" y="230">ui-vedro/</text>
    <text class="sub"   x="420" y="252">vedro + d42 + Webbricks-style PO</text>
    <text class="sub"   x="420" y="270">typed MockedRoute + d42 schemas  ·  7 scenarios</text>

    <rect class="box" x="400" y="310" width="400" height="90" rx="2"/>
    <text class="label" x="420" y="340">api/</text>
    <text class="sub"   x="420" y="362">pytest + requests + ApiManager facade</text>
    <text class="sub"   x="420" y="380">real HTTP · real JWT  ·  25 tests</text>
  </g>

  <!-- group: ci / reporting -->
  <g>
    <rect class="box-soft" x="880" y="40" width="280" height="380" rx="2"/>
    <text class="group-title" x="896" y="68">CI · REPORTING</text>

    <rect class="box" x="900" y="90"  width="240" height="80" rx="2"/>
    <text class="label" x="920" y="120">GitHub Actions</text>
    <text class="sub"   x="920" y="140">matrix job</text>
    <text class="sub"   x="920" y="158">api · ui-pytest · ui-vedro</text>

    <rect class="box" x="900" y="200" width="240" height="80" rx="2"/>
    <text class="label" x="920" y="230">Allure on Pages</text>
    <text class="sub"   x="920" y="250">combined results</text>
    <text class="sub"   x="920" y="268">published per main push</text>

    <rect class="box" x="900" y="310" width="240" height="80" rx="2"/>
    <text class="label" x="920" y="340">Landing</text>
    <text class="sub"   x="920" y="360">/ → here</text>
    <text class="sub"   x="920" y="378">/report → allure</text>
  </g>

  <!-- edges: ui-pytest -> SPA -->
  <g>
    <path class="edge" d="M 320 135 C 360 135 360 135 400 135" marker-end="url(#arrow)"/>
    <text class="edge-label" x="328" y="125">http.server -d ../app</text>
  </g>
  <!-- ui-vedro -> SPA -->
  <g>
    <path class="edge" d="M 320 135 C 360 175 360 215 400 245" marker-end="url(#arrow)"/>
  </g>
  <!-- api -> backend -->
  <g>
    <path class="edge" d="M 320 200 C 360 280 360 320 400 355" marker-end="url(#arrow)"/>
    <text class="edge-label" x="328" y="320">HTTP  /v1/*</text>
  </g>

  <!-- suites -> CI -->
  <g>
    <path class="edge" d="M 800 135 C 850 135 850 130 900 130" marker-end="url(#arrow)"/>
    <path class="edge" d="M 800 245 C 850 245 850 130 900 130" marker-end="url(#arrow)" stroke-opacity="0.5"/>
    <path class="edge" d="M 800 355 C 850 355 850 130 900 130" marker-end="url(#arrow)" stroke-opacity="0.5"/>
  </g>
  <!-- CI -> Allure -->
  <g>
    <path class="edge" d="M 1020 170 L 1020 200" marker-end="url(#arrow)"/>
  </g>
  <!-- Allure -> Landing -->
  <g>
    <path class="edge" d="M 1020 280 L 1020 310" marker-end="url(#arrow)"/>
  </g>

  <!-- caption -->
  <text class="group-title" x="60" y="510">ARCHITECTURE</text>
  <text class="sub"         x="60" y="535">One application. Three test architectures. Same Allure dashboard.</text>
</svg>
