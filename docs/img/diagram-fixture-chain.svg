<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#e8e2da"/>
    </marker>
    <style>
      .bg { fill: #030303; }
      .box { fill: none; stroke: #e8e2da; stroke-width: 1.2; }
      .label { fill: #f7f7f7; font-size: 18px; font-weight: 500; font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
      .sub { fill: rgba(247,247,247,0.55); font-size: 13px; }
      .scope { fill: #e8e2da; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
      .edge { stroke: #e8e2da; stroke-width: 1.2; fill: none; }
      .note { fill: rgba(232,226,218,0.55); font-size: 12px; font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
      .group-title { fill: rgba(232,226,218,0.55); font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; }
      .heading { fill: #f7f7f7; font-size: 22px; font-weight: 500; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="460"/>

  <text class="group-title" x="60" y="44">API · FIXTURE CHAIN</text>
  <text class="heading"     x="60" y="76">Picking the scope is the whole engineering exercise.</text>

  <!-- boxes left → right -->
  <g>
    <rect class="box" x="60"  y="130" width="200" height="120" rx="2"/>
    <text class="scope" x="76" y="156">scope=session</text>
    <text class="label" x="76" y="186">http_session</text>
    <text class="sub"   x="76" y="208">requests.Session()</text>
    <text class="sub"   x="76" y="226">default JSON headers</text>
    <text class="note"  x="76" y="244">~0 ms</text>
  </g>

  <g>
    <rect class="box" x="290" y="130" width="200" height="120" rx="2"/>
    <text class="scope" x="306" y="156">scope=session</text>
    <text class="label" x="306" y="186">auth_token</text>
    <text class="sub"   x="306" y="208">POST /v1/auth/login</text>
    <text class="sub"   x="306" y="226">JWT once per run</text>
    <text class="note"  x="306" y="244">~200 ms</text>
  </g>

  <g>
    <rect class="box" x="520" y="130" width="200" height="120" rx="2"/>
    <text class="scope" x="536" y="156">scope=session</text>
    <text class="label" x="536" y="186">auth_session</text>
    <text class="sub"   x="536" y="208">session + Authorization:</text>
    <text class="sub"   x="536" y="226">Bearer &lt;jwt&gt;</text>
    <text class="note"  x="536" y="244">~0 ms</text>
  </g>

  <g>
    <rect class="box" x="750" y="130" width="200" height="120" rx="2"/>
    <text class="scope" x="766" y="156">scope=class</text>
    <text class="label" x="766" y="186">api_manager</text>
    <text class="sub"   x="766" y="208">ApiManager(auth_session)</text>
    <text class="sub"   x="766" y="226">.auth · .tasks</text>
    <text class="note"  x="766" y="244">~0 ms</text>
  </g>

  <g>
    <rect class="box" x="980" y="130" width="160" height="120" rx="2"/>
    <text class="scope" x="996" y="156">scope=function</text>
    <text class="label" x="996" y="186">clean_tasks</text>
    <text class="sub"   x="996" y="208">DELETE /v1/tasks</text>
    <text class="sub"   x="996" y="226">before each test</text>
    <text class="note"  x="996" y="244">~10 ms</text>
  </g>

  <!-- arrows -->
  <g>
    <path class="edge" d="M 260 190 L 290 190" marker-end="url(#arr2)"/>
    <path class="edge" d="M 490 190 L 520 190" marker-end="url(#arr2)"/>
    <path class="edge" d="M 720 190 L 750 190" marker-end="url(#arr2)"/>
    <path class="edge" d="M 950 190 L 980 190" marker-end="url(#arr2)"/>
  </g>

  <!-- explanation -->
  <g>
    <text class="group-title" x="60" y="320">WHY THESE SCOPES</text>
    <text class="sub" x="60" y="346">auth_token at scope=session: POST /login is ~200 ms — 100 tests at function-scope would burn ~20 sec on login.</text>
    <text class="sub" x="60" y="368">clean_tasks at scope=function: state isolation between tests is non-negotiable.</text>
    <text class="sub" x="60" y="390">api_manager at scope=class: object creation is free, but per-class isolation keeps test classes independent.</text>
  </g>
</svg>
